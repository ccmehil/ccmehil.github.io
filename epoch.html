<html>
<head>
    <title>msecs to date</title>
</head>
<body>

    <script>
        function getParams(lv_param){
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i=0;i<vars.length;i++) {
                    var pair = vars[i].split("=");
                    if(pair[0] == lv_param){return pair[1];}
            }
            return(false);
        }

        var utcSeconds = getParams("msecs");
        var d = new Date(0); 
        d.setUTCSeconds(utcSeconds);
        document.write(d.toDateString());
    </script>

</body>
</html>
