<html>
<head>
    <title>msecs to date</title>
</head>
<body>

    <script>
        function getParams(lv_param){
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i=0;i<vars.length;i++) {
                    var pair = vars[i].split("=");
                    if(pair[0] == lv_param){return pair[1];}
            }
            return(false);
        }

        var utcSeconds = getParams("msecs");
        console.log(utcSeconds)
        var milisegundos = parseInt(utcSeconds.replace("/Date(", "").replace(")/", ""));
        var newDate = new Date(milisegundos).toLocaleDateString("en-UE");
        document.write(newDate)
    </script>

</body>
</html>
